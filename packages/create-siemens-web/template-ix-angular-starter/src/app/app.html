<a href="#main-content" class="skip-link">Skip to main content</a>
<ix-application>
  <ix-application-header name="Siemens Industrial Experience Starter App">
    @if (showLogo) {
      <app-company-logo slot="logo"></app-company-logo>
    }
    <ix-avatar initials="JD" aria-label="User avatar: JD"></ix-avatar>
  </ix-application-header>

  <ix-menu enableToggleTheme aria-label="Main navigation">
    <a routerLink="" tabindex="-1">
      <ix-menu-item [icon]="icons.iconHome" [attr.active]="isActiveRoute('/') ? '' : null">
        Get Started
      </ix-menu-item>
    </a>
    <a routerLink="forms" tabindex="-1">
      <ix-menu-item
        [icon]="icons.iconTextDocument"
        [attr.active]="isActiveRoute('/forms') ? '' : null"
      >
        Forms
      </ix-menu-item>
    </a>
    <a routerLink="charts" tabindex="-1">
      <ix-menu-item
        [icon]="icons.iconPiechart"
        [attr.active]="isActiveRoute('/charts') ? '' : null"
      >
        Charts
      </ix-menu-item>
    </a>
    <a routerLink="grids" tabindex="-1">
      <ix-menu-item [icon]="icons.iconTable" [attr.active]="isActiveRoute('/grids') ? '' : null">
        Grids
      </ix-menu-item>
    </a>
  </ix-menu>

  <ix-content>
    <div id="main-content">
      <router-outlet />
    </div>
  </ix-content>
</ix-application>
