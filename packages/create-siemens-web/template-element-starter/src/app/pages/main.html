<si-application-header>
  <si-header-brand>
    <a siHeaderLogo routerLink="/" class="d-none d-md-flex"></a>
    <h1 class="application-name">Siemens Element Starter App</h1>
  </si-header-brand>
  <si-header-actions>
    <button
      si-header-account-item
      type="button"
      name="Jane Smith"
      [siHeaderDropdownTriggerFor]="account"
    >
    </button>
  </si-header-actions>
</si-application-header>
<si-navbar-vertical stateId="navbar-vertical" searchPlaceholder="Search..." [items]="menuItems">
  <div class="si-layout-main-padding si-layout-inner">
    <router-outlet />
  </div>
</si-navbar-vertical>

<ng-template #account>
  <si-header-dropdown>
    <div class="mx-5">
      <div class="fw-bold">Jane Smith</div>
      <div>jane.smith.simpl&#64;siemens.com</div>
      <div class="d-flex align-items-center text-secondary mt-2">
        Siemens
        <span class="badge bg-default">Admin</span>
      </div>
    </div>
  </si-header-dropdown>
</ng-template>
