<div class="charts-page">
  <div class="page-header">
    <ix-content-header headerTitle="Charts"></ix-content-header>
    <ix-button
      variant="secondary"
      [attr.aria-label]="showTable ? 'Show as chart' : 'Show as data table'"
      (click)="toggleView()"
    >
      {{ showTable ? 'Show as chart' : 'Show as data table' }}
    </ix-button>
  </div>
  <ix-typography format="body" class="description">
    Siemens Industrial Experience provides an
    <a
      href="https://echarts.apache.org"
      target="_blank"
      rel="noreferrer"
      aria-label="ECharts (opens in a new tab)"
      >ECharts</a
    >
    theme.
    <br />
    This lets you use different chart types in the Siemens Industrial Experience design system.
  </ix-typography>

  <ix-typography format="label-lg" bold class="chart-title" id="chart-title">
    Motor vibration analysis
  </ix-typography>

  @if (showTable) {
    <section class="table-container" aria-label="Chart data table">
      <ag-grid-angular
        [rowData]="chartTableData"
        [columnDefs]="chartTableColDefs"
        [suppressMovableColumns]="true"
        [domLayout]="'autoHeight'"
        [rowHeight]="36"
        [theme]="ixTheme"
        aria-label="Motor vibration data table"
      />
    </section>
  } @else {
    <figure #chartContainer aria-labelledby="chart-title" class="chart-container">
      <figcaption class="sr-only">Bar chart showing monthly production output</figcaption>
    </figure>
  }
</div>
