@if (error()) {
  <div class="error-boundary" role="alert" aria-live="assertive">
    <ix-typography format="h1" class="title">
      Something went wrong
    </ix-typography>
    <ix-typography format="body" class="message">
      {{ error()?.message || 'An unexpected error occurred' }}
    </ix-typography>
    <ix-button variant="primary" class="reload-button" aria-label="Reload page" (click)="reload()">
      Reload Page
    </ix-button>
  </div>
} @else {
  <ng-content />
}
