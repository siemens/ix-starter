name: Deploy GitHub Page

on:
  workflow_dispatch:
    inputs:
      confirm_deployment:
        description: 'Please confirm deployment'
        required: true
        type: boolean
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

concurrency: deploy-gh-pages-${{ github.ref }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-starter-templates:
    if: >-
      github.repository == 'siemens/ix-starter' &&
      (github.event_name == 'pull_request' || inputs.confirm_deployment == true)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: ./.github/workflows/actions/install

      - name: Build create-siemens-web
        run: pnpm --filter create-siemens-web build

      - name: Install corporate theme
        run: pnpm --filter ix-theme-downloader download
        env:
          CSC_TOKEN: ${{ secrets.CSC_TOKEN }}
          BRAND_URL: ${{ vars.BRAND_URL }}
          BRAND_VERSION: ${{ vars.BRAND_VERSION }}

      - name: Scaffold React Starter
        run: >-
          node packages/create-siemens-web/index.js github-pages-source/react-starter
          --no-interactive --template ix-react-starter

      - name: Install React Starter dependencies
        working-directory: github-pages-source/react-starter
        run: pnpm install --ignore-workspace

      - name: Build React Starter
        working-directory: github-pages-source/react-starter
        run: pnpm --ignore-workspace exec tsc && pnpm --ignore-workspace exec vite build --base=/ix-starter/react-starter/

      - name: Add corporate theme to React Starter
        run: cp -R node_modules/@siemens-ix/corporate-theme github-pages-source/react-starter/dist/theme

      - name: Configure React Starter corporate theme
        run: >-
          sed -i 's/data-ix-theme="classic"/data-ix-theme="brand"/'
          github-pages-source/react-starter/dist/index.html

      - name: Add React Starter corporate theme assets
        run: >-
          sed -i 's|</head>|    <link rel="stylesheet" href="/ix-starter/react-starter/theme/dist/css/brand-theme.css">\n    <script type="module" src="/ix-starter/react-starter/theme/dist/index.js"></script>\n  </head>|'
          github-pages-source/react-starter/dist/index.html

      - name: Prepare React Starter artifact directory
        run: mkdir -p github-pages/react-starter

      - name: Copy React Starter artifact
        run: cp -R github-pages-source/react-starter/dist/. github-pages/react-starter/

      - name: Scaffold Vue Starter
        run: >-
          node packages/create-siemens-web/index.js github-pages-source/vue-starter
          --no-interactive --template ix-vue-starter

      - name: Install Vue Starter dependencies
        working-directory: github-pages-source/vue-starter
        run: pnpm install --ignore-workspace

      - name: Build Vue Starter
        working-directory: github-pages-source/vue-starter
        run: pnpm --ignore-workspace exec vue-tsc && pnpm --ignore-workspace exec vite build --base=/ix-starter/vue-starter/

      - name: Add corporate theme to Vue Starter
        run: cp -R node_modules/@siemens-ix/corporate-theme github-pages-source/vue-starter/dist/theme

      - name: Configure Vue Starter corporate theme
        run: >-
          sed -i 's/data-ix-theme="classic"/data-ix-theme="brand"/'
          github-pages-source/vue-starter/dist/index.html

      - name: Add Vue Starter corporate theme assets
        run: >-
          sed -i 's|</head>|    <link rel="stylesheet" href="/ix-starter/vue-starter/theme/dist/css/brand-theme.css">\n    <script type="module" src="/ix-starter/vue-starter/theme/dist/index.js"></script>\n  </head>|'
          github-pages-source/vue-starter/dist/index.html

      - name: Prepare Vue Starter artifact directory
        run: mkdir -p github-pages/vue-starter

      - name: Copy Vue Starter artifact
        run: cp -R github-pages-source/vue-starter/dist/. github-pages/vue-starter/

      - name: Scaffold Angular Starter
        run: >-
          node packages/create-siemens-web/index.js github-pages-source/angular-starter
          --no-interactive --template ix-angular-starter

      - name: Install Angular Starter dependencies
        working-directory: github-pages-source/angular-starter
        run: pnpm install --ignore-workspace

      - name: Build Angular Starter
        working-directory: github-pages-source/angular-starter
        run: pnpm --ignore-workspace exec ng build --base-href=/ix-starter/angular-starter/

      - name: Add corporate theme to Angular Starter
        run: cp -R node_modules/@siemens-ix/corporate-theme github-pages-source/angular-starter/dist/ix-angular-starter/browser/theme

      - name: Configure Angular Starter corporate theme
        run: >-
          sed -i 's/data-ix-theme="classic"/data-ix-theme="brand"/'
          github-pages-source/angular-starter/dist/ix-angular-starter/browser/index.html

      - name: Add Angular Starter corporate theme assets
        run: >-
          sed -i 's|</head>|    <link rel="stylesheet" href="/ix-starter/angular-starter/theme/dist/css/brand-theme.css">\n    <script type="module" src="/ix-starter/angular-starter/theme/dist/index.js"></script>\n  </head>|'
          github-pages-source/angular-starter/dist/ix-angular-starter/browser/index.html

      - name: Prepare Angular Starter artifact directory
        run: mkdir -p github-pages/angular-starter

      - name: Copy Angular Starter artifact
        run: cp -R github-pages-source/angular-starter/dist/ix-angular-starter/browser/. github-pages/angular-starter/

      - name: Scaffold Element Starter
        run: >-
          node packages/create-siemens-web/index.js github-pages-source/element-starter
          --no-interactive --template element-starter

      - name: Configure Element registry
        working-directory: github-pages-source/element-starter
        run: pnpm config set --location=project @simpl:registry https://code.siemens.com/api/v4/packages/npm/

      - name: Configure Element registry token
        working-directory: github-pages-source/element-starter
        run: pnpm config set --location=project //code.siemens.com/api/v4/packages/npm/:_authToken "$CSC_TOKEN"
        env:
          CSC_TOKEN: ${{ secrets.CSC_TOKEN }}

      - name: Install Element Starter dependencies
        working-directory: github-pages-source/element-starter
        run: pnpm install --ignore-workspace

      - name: Build Element Starter
        working-directory: github-pages-source/element-starter
        run: pnpm --ignore-workspace exec ng build --base-href=/ix-starter/element-starter/

      - name: Prepare Element Starter artifact directory
        run: mkdir -p github-pages/element-starter

      - name: Copy Element Starter artifact
        run: cp -R github-pages-source/element-starter/dist/element-starter/browser/. github-pages/element-starter/

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: github-pages

      - name: Deploy starter templates
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: deployment
        uses: actions/deploy-pages@v4
